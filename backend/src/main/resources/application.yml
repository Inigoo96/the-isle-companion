spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/isle_companion?stringtype=unspecified}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

server:
  error:
    include-message: always
    include-binding-errors: always

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  super-admin-steam-id: ${SUPER_ADMIN_STEAM_ID:}
  admin-url: ${ADMIN_URL:http://localhost:5173}
  # Discord user ids con permisos de moderacion de plataforma (separados por coma).
  platform-admins: ${PLATFORM_ADMINS:}
  # Solo para desarrollo local: permite arrancar con el JWT_SECRET de dev.
  # En produccion debe quedar false (default) y definirse un JWT_SECRET real.
  allow-insecure-dev-secret: ${APP_ALLOW_INSECURE_DEV_SECRET:false}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-256-bits}
  expiration-days: ${JWT_EXPIRATION_DAYS:30}

steam:
  api-key: ${STEAM_API_KEY:}

discord:
  client-id:     ${DISCORD_CLIENT_ID:}
  client-secret: ${DISCORD_CLIENT_SECRET:}
  redirect-uri:  ${DISCORD_REDIRECT_URI:http://localhost:8080/auth/discord/callback}
